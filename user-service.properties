server.port=8081

spring.application.name=USER-SERVICE

eureka.client.service-url.defaultZone=http://localhost:9090/eureka
#spring.application.name=User-Service
#server.port=8081
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type=TRACE
spring.datasource.username=root
spring.datasource.password=root@12345
spring.datasource.url=jdbc:mysql://localhost:3306/microservice
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
#eureka.client.service-url.defaultZone=http://localhost:9090/eureka
management.endpoints.web.exposure.include=*
management.health.circuitbreakers.enabled=true
resilience4j.circuitbreaker.instances.ratingHotelBreaker.register-health-indicator=true

resilience4j.circuitbreaker.instances.ratingHotelBreaker.event-consumer-buffer-size=10

resilience4j.circuitbreaker.instances.ratingHotelBreaker.failure-rate-threshold=50

resilience4j.circuitbreaker.instances.ratingHotelBreaker.minimum-number-of-calls=5

resilience4j.circuitbreaker.instances.ratingHotelBreaker.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.ratingHotelBreaker.wait-duration-in-open-state=10s

resilience4j.circuitbreaker.instances.ratingHotelBreaker.permitted-number-of-calls-in-half-open-state=3

resilience4j.circuitbreaker.instances.ratingHotelBreaker.sliding-window-size=10
# RETRY
resilience4j.retry.instances.ratingHotelService.max-attempts=3
resilience4j.retry.instances.ratingHotelService.wait-duration=2s



resilience4j.circuitbreaker.instances.ratingHotelBreaker.sliding-window-type=COUNT_BASED
